<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Tres en Raya</title>
    <link rel="stylesheet" href="cero.css">
    <link rel="icon" href="cero.png" type="image/x-icon">
</head>

<body>

    <h1>Tres en Raya</h1>

    <!-- Menu -->
    <div id="menu">
        <button id="vs-pc">Jugar contra la máquina</button>
        <button id="vs-player">Multijugador</button>
    </div>


    <div id="game" style="display: none;">
        <div id="board">

            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>

            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>

            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>

        </div>

        <p id="status"></p>

        <button id="restart">Reiniciar</button>
        <button id="back">Volver al Menú</button>

    </div>

    <script src="cero.js"></script>

</body>

</html>
