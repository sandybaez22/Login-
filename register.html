<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- LADO IZQUIERDO -->
        <div class="image-side">
            <h1>Registrarse</h1>
            <p>Crea tu cuenta para continuar</p>
        </div>

        <!-- LADO DERECHO -->
        <div class="login-side">

            <div class="login-box">

                <h2>Crear Cuenta</h2>


                <form>

                    <div class="input-group">
                        <label>Nombre</label>
                        <input type="text" id="name" placeholder="Ingresa tu nombre" required>
                    </div>

                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="email" placeholder="Ingresa tu email" required>
                    </div>

                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" id="password" placeholder="Ingresa tu contraseña" required>
                    </div>

                    <div class="input-group">
                        <label>Confirmar Contraseña</label>
                        <input type="password" id="confirm-password" placeholder="Confirma tu contraseña" required>

                        <button type="submit">Crear Cuenta</button>

                        <p id="message" class="message"></p>

                        <p class="register-text">
                            ¿Ya tienes cuenta? <a href="index.html">Iniciar Sesión</a>
                        </p>

                </form>

                </div>

            </div>

        </div>

        <script src="register.js"></script>
</body>

</html>
